name: Go CI

on:
  workflow_call:
    inputs:
      go-version:
        description: "Go version"
        type: string
        default: "1.26"
      golangci-lint-version:
        description: "golangci-lint version"
        type: string
        default: "v2"
      buf-lint:
        description: "Run buf lint for protobuf projects"
        type: boolean
        default: false
      codecov:
        description: "Upload coverage to Codecov"
        type: boolean
        default: true
      docker:
        description: "Build and push Docker image to Scaleway registry"
        type: boolean
        default: false
      working-directory:
        description: "Working directory for monorepos"
        type: string
        default: "."
    secrets:
      CODECOV_TOKEN:
        required: false
      SCW_SECRET_KEY:
        required: false

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ inputs.golangci-lint-version }}
          working-directory: ${{ inputs.working-directory }}
          args: --timeout=5m

  buf-lint:
    name: Buf Lint
    if: inputs.buf-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Lint protobuf
        uses: bufbuild/buf-action@v1
        with:
          lint: true
          breaking: false
          format: false

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: inputs.codecov
        uses: codecov/codecov-action@v5
        with:
          files: ${{ inputs.working-directory }}/coverage.out
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      - name: Build binary
        run: CGO_ENABLED=0 go build -o /dev/null ./cmd/server

  docker:
    name: Docker
    if: inputs.docker
    needs: [lint, test, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      REGISTRY: rg.fr-par.scw.cloud
      IMAGE_NAME: infobits/${{ github.event.repository.name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: rg.fr-par.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Generate image tag
        id: meta
        env:
          IS_PR: ${{ github.event_name == 'pull_request' }}
          IS_DEFAULT_BRANCH: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          TS=$(date -u +%Y%m%dT%H%M%S)
          HASH=${GITHUB_SHA::8}
          if [ "$IS_PR" = "true" ]; then
            echo "tag=pr-${TS}-${HASH}" >> "$GITHUB_OUTPUT"
            echo "latest=false" >> "$GITHUB_OUTPUT"
          elif [ "$IS_DEFAULT_BRANCH" = "true" ]; then
            echo "tag=${TS}-${HASH}" >> "$GITHUB_OUTPUT"
            echo "latest=true" >> "$GITHUB_OUTPUT"
          else
            BRANCH=$(echo "$REF_NAME" | sed 's/[^a-zA-Z0-9._-]/-/g')
            echo "tag=${BRANCH}-${TS}-${HASH}" >> "$GITHUB_OUTPUT"
            echo "latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.working-directory }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.latest == 'true' && format('{0}/{1}:latest', env.REGISTRY, env.IMAGE_NAME) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
