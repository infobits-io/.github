name: Website CI

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        type: string
        default: "24.x"
      lint-command:
        description: "Lint command"
        type: string
        default: "pnpm run lint"
      test-command:
        description: "Test command"
        type: string
        default: "pnpm run test:ci"
      build-command:
        description: "Build command"
        type: string
        default: "pnpm run build"
      deploy-command:
        description: "Deploy command"
        type: string
        default: "pnpm run deploy"
      working-directory:
        description: "Working directory for monorepos"
        type: string
        default: "."
      coverage:
        description: "Upload coverage artifacts and PR report"
        type: boolean
        default: true
      docker:
        description: "Build and push Docker image to Scaleway registry"
        type: boolean
        default: false
      image-name:
        description: "Docker image name (default: infobits/<repo-name>)"
        type: string
        default: ""
    secrets:
      FONTAWESOME_NPM_AUTH_TOKEN:
        required: false
      CLOUDFLARE_API_KEY:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false
      SCW_SECRET_KEY:
        required: false

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v6

      - uses: infobits-io/.github/actions/setup-pnpm@master
        with:
          node-version: ${{ inputs.node-version }}
          github-token: ${{ github.token }}
          fontawesome-token: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}
          working-directory: ${{ inputs.working-directory }}

      - name: Lint
        run: ${{ inputs.lint-command }}

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v6

      - uses: infobits-io/.github/actions/setup-pnpm@master
        with:
          node-version: ${{ inputs.node-version }}
          github-token: ${{ github.token }}
          fontawesome-token: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}
          working-directory: ${{ inputs.working-directory }}

      - name: Test
        run: ${{ inputs.test-command }}

      - name: Upload test coverage
        if: inputs.coverage
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: ${{ inputs.working-directory }}/coverage/

      - name: Report Coverage
        if: inputs.coverage && github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.4.0
        with:
          lcov-file: ${{ inputs.working-directory }}/coverage/lcov.info
          github-token: ${{ github.token }}

  build:
    name: Build
    if: github.event_name == 'pull_request'
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v6

      - uses: infobits-io/.github/actions/setup-pnpm@master
        with:
          node-version: ${{ inputs.node-version }}
          github-token: ${{ github.token }}
          fontawesome-token: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}
          working-directory: ${{ inputs.working-directory }}

      - name: Build
        run: ${{ inputs.build-command }}

  deploy:
    name: Deploy
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v6

      - uses: infobits-io/.github/actions/setup-pnpm@master
        with:
          node-version: ${{ inputs.node-version }}
          github-token: ${{ github.token }}
          fontawesome-token: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}
          working-directory: ${{ inputs.working-directory }}

      - name: Build
        run: ${{ inputs.build-command }}

      - name: Deploy
        run: ${{ inputs.deploy-command }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  docker:
    name: Docker
    if: inputs.docker
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      REGISTRY: rg.fr-par.scw.cloud
      IMAGE_NAME: ${{ inputs.image-name != '' && inputs.image-name || format('infobits/{0}', github.event.repository.name) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: rg.fr-par.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Generate image tag
        id: meta
        env:
          IS_PR: ${{ github.event_name == 'pull_request' }}
          IS_DEFAULT_BRANCH: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          TS=$(date -u +%Y%m%dT%H%M%S)
          HASH=${GITHUB_SHA::8}
          if [ "$IS_PR" = "true" ]; then
            echo "tag=pr-${TS}-${HASH}" >> "$GITHUB_OUTPUT"
            echo "latest=false" >> "$GITHUB_OUTPUT"
          elif [ "$IS_DEFAULT_BRANCH" = "true" ]; then
            echo "tag=${TS}-${HASH}" >> "$GITHUB_OUTPUT"
            echo "latest=true" >> "$GITHUB_OUTPUT"
          else
            BRANCH=$(echo "$REF_NAME" | sed 's/[^a-zA-Z0-9._-]/-/g')
            echo "tag=${BRANCH}-${TS}-${HASH}" >> "$GITHUB_OUTPUT"
            echo "latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.working-directory }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.latest == 'true' && format('{0}/{1}:latest', env.REGISTRY, env.IMAGE_NAME) || '' }}
          secrets: |
            GITHUB_TOKEN=${{ github.token }}
            FONTAWESOME_NPM_AUTH_TOKEN=${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
