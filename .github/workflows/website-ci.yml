name: Website CI

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        type: string
        default: "24.x"
      lint-command:
        description: "Lint command"
        type: string
        default: "pnpm run lint"
      test-command:
        description: "Test command"
        type: string
        default: "pnpm run test:ci"
      build-command:
        description: "Build command"
        type: string
        default: "pnpm run build"
      deploy-command:
        description: "Deploy command"
        type: string
        default: "pnpm run deploy"
      working-directory:
        description: "Working directory for monorepos"
        type: string
        default: "."
      coverage:
        description: "Upload coverage artifacts and PR report"
        type: boolean
        default: true
    secrets:
      FONTAWESOME_NPM_AUTH_TOKEN:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v6

      - uses: infobits-io/.github/actions/setup-pnpm@master
        with:
          node-version: ${{ inputs.node-version }}
          github-token: ${{ github.token }}
          fontawesome-token: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}
          working-directory: ${{ inputs.working-directory }}

      - name: Lint
        run: ${{ inputs.lint-command }}

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v6

      - uses: infobits-io/.github/actions/setup-pnpm@master
        with:
          node-version: ${{ inputs.node-version }}
          github-token: ${{ github.token }}
          fontawesome-token: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}
          working-directory: ${{ inputs.working-directory }}

      - name: Test
        run: ${{ inputs.test-command }}

      - name: Upload test coverage
        if: inputs.coverage
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: ${{ inputs.working-directory }}/coverage/

      - name: Report Coverage
        if: inputs.coverage && github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.4.0
        with:
          lcov-file: ${{ inputs.working-directory }}/coverage/lcov.info
          github-token: ${{ github.token }}

  build:
    name: Build
    if: github.event_name == 'pull_request'
    needs: [lint, test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v6

      - uses: infobits-io/.github/actions/setup-pnpm@master
        with:
          node-version: ${{ inputs.node-version }}
          github-token: ${{ github.token }}
          fontawesome-token: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}
          working-directory: ${{ inputs.working-directory }}

      - name: Build
        run: ${{ inputs.build-command }}

  deploy:
    name: Deploy
    if: github.event_name == 'push'
    needs: [lint, test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v6

      - uses: infobits-io/.github/actions/setup-pnpm@master
        with:
          node-version: ${{ inputs.node-version }}
          github-token: ${{ github.token }}
          fontawesome-token: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}
          working-directory: ${{ inputs.working-directory }}

      - name: Build
        run: ${{ inputs.build-command }}

      - name: Deploy
        run: ${{ inputs.deploy-command }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
