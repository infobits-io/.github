name: "Setup pnpm"
description: "Install pnpm, configure Node.js with caching, set up npm registries, and install dependencies"

inputs:
  node-version:
    description: "Node.js version to use"
    required: false
    default: "24.x"
  github-token:
    description: "GitHub token for GitHub Packages registry"
    required: true
  fontawesome-token:
    description: "FontAwesome Pro registry token (optional)"
    required: false
    default: ""
  working-directory:
    description: "Working directory for monorepos"
    required: false
    default: "."
  install:
    description: "Whether to run pnpm install"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: "https://registry.npmjs.org"
        cache: "pnpm"
        cache-dependency-path: ${{ inputs.working-directory }}/pnpm-lock.yaml

    - name: Configure npm registries
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        echo "@infobits-io:registry=https://npm.pkg.github.com" >> .npmrc
        echo "//npm.pkg.github.com/:_authToken=${{ inputs.github-token }}" >> .npmrc
        if [ -n "${{ inputs.fontawesome-token }}" ]; then
          echo "@fortawesome:registry=https://npm.fontawesome.com/" >> .npmrc
          echo "//npm.fontawesome.com/:_authToken=${{ inputs.fontawesome-token }}" >> .npmrc
        fi

    - name: Install dependencies
      if: inputs.install == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pnpm install --frozen-lockfile
      env:
        FONTAWESOME_NPM_AUTH_TOKEN: ${{ inputs.fontawesome-token }}
